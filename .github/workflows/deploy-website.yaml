name: Deploy website
run-name: Deploy website

on:
  # NOTE: Runs on branch or tag creation.
  create:
    branches:
      - main
  # Runs when a new pre-release version was prepared.
  repository_dispatch:
    types:
      - prepare-pre-release-event
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      debug:
        description: Sets "NODE_ENV" to "debug".
        default: false
        type: boolean

jobs:
  main:
    runs-on: ubuntu-latest
    container: node:lts

    steps:
      - name: DEBUG
        run: echo secret is ${{ secrets.PAT_TOKEN_GITHUB }}
        shell: bash

      - uses: thaibault/website-utilities@main
        with:
          debug: ${{ inputs.debug || '' }}
          pat-token: ${{ secrets.PAT_TOKEN_GITHUB }}
          repository: ${{ github.repository_owner }}/${{ github.repository_owner }}.github.io
